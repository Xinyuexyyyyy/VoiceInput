name: Static checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  rust:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.88", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo test --locked
        working-directory: src-tauri
      - run: cargo check --locked
        working-directory: src-tauri
